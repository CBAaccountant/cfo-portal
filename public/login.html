<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clear Books Advisory | Portal Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --blue-dark: #5c4fd6;
  --blue: #7c6ef5;
  --blue-light: #a89cf7;
  --text-primary: #1a1d2e;
  --text-secondary: #4a5568;
  --text-muted: #a0aec0;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.14);
  --card-bg: #ffffff;
  --red: #e17055;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', sans-serif;
  background: #f0f1f5;
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: .06em;
  color: var(--text-primary);
  margin-bottom: 4px;
  text-align: center;
}
.brand span { color: var(--blue); }
.brand-sub {
  font-size: .68rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 36px;
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 44px;
  width: min(420px, 100%);
  box-shadow: 0 4px 24px rgba(0,0,0,.07);
}
.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 6px;
}
.card-sub {
  font-size: .8rem;
  color: var(--text-muted);
  margin-bottom: 28px;
}

.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-size: .72rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 7px;
}
.field input {
  width: 100%;
  padding: 10px 14px;
  background: #f7f8fa;
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: .88rem;
  color: var(--text-primary);
  outline: none;
  transition: border-color .2s;
}
.field input:focus { border-color: var(--blue); background: #fff; }

.btn {
  width: 100%;
  padding: 11px;
  background: var(--blue-dark);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-family: 'Outfit', sans-serif;
  font-size: .88rem;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .2s;
  margin-top: 8px;
}
.btn:hover { background: var(--blue); }
.btn:disabled { opacity: .6; cursor: not-allowed; }

.error {
  background: #fff5f3;
  border: 1px solid #fdd9d3;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: .8rem;
  color: var(--red);
  margin-bottom: 18px;
  display: none;
}
.error.show { display: block; }

.footer {
  margin-top: 32px;
  font-size: .65rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: center;
}
</style>
</head>
<body>

<div class="brand">Clear Books <span>Advisory</span></div>
<div class="brand-sub">Client Financial Portal</div>

<div class="card">
  <div class="card-title">Sign In</div>
  <div class="card-sub">Enter your email and password to access your dashboard.</div>

  <div class="error" id="errMsg"></div>

  <form id="loginForm">
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" autocomplete="email" placeholder="you@company.com" required/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required/>
    </div>
    <button type="submit" class="btn" id="loginBtn">Sign In</button>
  </form>
</div>

<div class="footer">Clear Books Advisory &nbsp;·&nbsp; Confidential</div>

<script>
const form    = document.getElementById('loginForm');
const errMsg  = document.getElementById('errMsg');
const loginBtn = document.getElementById('loginBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errMsg.classList.remove('show');
  loginBtn.disabled = true;
  loginBtn.textContent = 'Signing in…';

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      errMsg.textContent = data.error || 'Login failed. Please try again.';
      errMsg.classList.add('show');
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign In';
      return;
    }

    window.location.href = data.redirect;
  } catch (err) {
    errMsg.textContent = 'Network error. Please try again.';
    errMsg.classList.add('show');
    loginBtn.disabled = false;
    loginBtn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
